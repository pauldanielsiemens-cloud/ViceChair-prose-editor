<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ViceChair Prose Editor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Georgia,serif;background:#1a1a18;color:#d4cfc0;min-height:100vh;}
.app{display:grid;grid-template-columns:210px 1fr 300px;grid-template-rows:48px 1fr;height:100vh;}

/* ── MOBILE LAYOUT ────────────────────────────────── */
@media(max-width:700px){
  .app{display:flex;flex-direction:column;height:100vh;height:100dvh;}
  .topbar{flex-shrink:0;padding:0 10px;gap:6px;overflow-x:auto;}
  .topbar .brand{display:none;}
  .save-badge{display:none;}
  .btn{padding:5px 10px;font-size:11px;white-space:nowrap;}
  .sidebar,.editor,.preview-panel{
    flex:1;min-height:0;overflow-y:auto;
    display:none;
  }
  .sidebar.mobile-active,
  .editor.mobile-active,
  .preview-panel.mobile-active{display:block;}
  .tab-bar{
    display:flex;flex-shrink:0;
    background:#111110;border-top:1px solid #2a2a27;
    height:52px;
  }
  .tab-btn{
    flex:1;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:2px;
    font-size:10px;color:#555;letter-spacing:.06em;text-transform:uppercase;
    cursor:pointer;border:none;background:transparent;font-family:Georgia,serif;
    border-top:2px solid transparent;
  }
  .tab-btn.active{color:#c8b97a;border-top-color:#8a7a5a;}
  .tab-btn .tab-icon{font-size:16px;line-height:1;}
  .nav-item{padding:12px 16px;font-size:14px;}
  .nav-count{font-size:11px;}
  .entry-row{padding:12px;}
  .entry-txt{font-size:14px;}
  .del-btn{opacity:1;padding:5px 10px;font-size:12px;}
  .tag{padding:6px 10px;font-size:12px;}
  textarea,input[type=text],select{font-size:15px;padding:10px;}
  .add-row{padding:14px;font-size:13px;}
  .pv-box{font-size:14px;line-height:1.9;}
  .editor{padding:14px 16px;}
  .preview-panel{padding:14px 16px;}
  .export-area{font-size:12px;}
}

/* ── DESKTOP: hide tab bar ────────────────────────── */
@media(min-width:701px){
  .tab-bar{display:none;}
  .sidebar,.editor,.preview-panel{display:block !important;}
}
.topbar{grid-column:1/-1;background:#111110;border-bottom:1px solid #333;display:flex;align-items:center;padding:0 16px;gap:12px;}
.topbar .brand{font-size:13px;color:#888;letter-spacing:.08em;text-transform:uppercase;margin-right:auto;}
.save-badge{font-size:11px;color:#555;font-style:italic;}
.save-badge.saved{color:#7a9a6a;}
.btn{padding:6px 14px;font-size:12px;font-family:Georgia,serif;border:1px solid #444;background:transparent;color:#aaa;cursor:pointer;letter-spacing:.04em;}
.btn:hover{background:#252522;color:#d4cfc0;}
.btn-gold{border-color:#8a7a5a;color:#c8b97a;}
.btn-gold:hover{background:#2a2518;color:#e0cd90;}
.sidebar{grid-row:2;background:#141412;border-right:1px solid #2a2a27;overflow-y:auto;padding:10px 0;}
.nav-group{padding:8px 12px 3px;font-size:10px;color:#444;letter-spacing:.12em;text-transform:uppercase;margin-top:4px;}
.nav-item{padding:7px 16px;font-size:13px;color:#777;cursor:pointer;border-left:2px solid transparent;display:flex;align-items:center;justify-content:space-between;}
.nav-item:hover{color:#b8b090;background:#1c1c19;}
.nav-item.active{color:#c8b97a;border-left-color:#8a7a5a;background:#1e1d19;}
.nav-count{font-size:10px;color:#444;}
.editor{grid-row:2;overflow-y:auto;padding:20px 24px;}
.ed-header{margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid #2a2a27;}
.ed-header h2{font-size:17px;font-weight:400;color:#c0b090;font-style:italic;margin-bottom:3px;}
.ed-header p{font-size:11px;color:#555;}
.entry-card{background:#161614;border:1px solid #262624;margin-bottom:8px;}
.entry-card.open{border-color:#8a7a5a;}
.entry-row{padding:9px 12px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;}
.entry-row:hover{background:#1c1c19;}
.entry-idx{font-size:10px;color:#444;letter-spacing:.06em;min-width:44px;margin-top:2px;flex-shrink:0;}
.entry-txt{font-size:13px;color:#a8a088;font-style:italic;flex:1;line-height:1.5;}
.entry-txt.empty{color:#333;font-style:normal;}
.del-btn{opacity:0;padding:2px 7px;font-size:11px;border:1px solid #333;background:transparent;color:#665;cursor:pointer;flex-shrink:0;}
.entry-card:hover .del-btn{opacity:1;}
.del-btn:hover{color:#c87a7a;border-color:#8a5a5a;}
.edit-body{display:none;padding:12px;border-top:1px solid #222;background:#101010;}
.edit-body.open{display:block;}
.fl{font-size:10px;color:#555;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px;margin-top:10px;}
.fl:first-child{margin-top:0;}
textarea,input[type=text],select{width:100%;background:#1a1a17;border:1px solid #2e2e2a;color:#c0b898;font-family:Georgia,serif;font-size:13px;padding:7px 9px;resize:vertical;}
textarea:focus,input:focus,select:focus{outline:none;border-color:#8a7a5a;}
select option{background:#1a1a17;}
.tag-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
.tag{padding:3px 8px;font-size:11px;border:1px solid #2e2e2a;color:#666;cursor:pointer;user-select:none;}
.tag:hover{border-color:#555;color:#999;}
.tag.on{border-color:#8a7a5a;color:#c8b97a;background:#1e1d19;}
.tag.on-red{border-color:#8a5a5a;color:#c87a7a;background:#1e1918;}
.reskin-grid{display:grid;grid-template-columns:90px 1fr;gap:3px;align-items:start;margin-bottom:4px;}
.rsk-lbl{font-size:11px;color:#555;padding-top:8px;}
.form-btns{margin-top:10px;display:flex;gap:6px;}
.add-row{border:1px dashed #252522;padding:9px;text-align:center;color:#444;cursor:pointer;font-size:12px;margin-top:4px;}
.add-row:hover{border-color:#555;color:#777;}
.sample-preview{font-style:italic;color:#8a7f63;background:#161512;border:1px solid #2e2e2a;padding:8px 10px;font-size:12.5px;line-height:1.5;}
.var-hint{font-size:10.5px;color:#555;margin-bottom:4px;}
.nav-group{cursor:pointer;user-select:none;display:flex;justify-content:space-between;align-items:center;}
.nav-group:hover{color:#999;}
.nav-group .nav-caret{font-size:9px;opacity:.6;transition:transform .15s;}
.nav-group.collapsed .nav-caret{transform:rotate(-90deg);}
.nav-group-body.collapsed{display:none;}
.vocab-search{width:100%;box-sizing:border-box;background:#15140f;border:1px solid #2e2e2a;color:#cfc9b8;padding:7px 9px;font-size:12.5px;margin-bottom:10px;font-family:inherit;}
.vocab-card{border:1px solid #252522;padding:8px 10px;margin-bottom:6px;}
.vocab-row{display:flex;align-items:baseline;gap:8px;cursor:pointer;}
.vocab-word{color:#c8b97a;font-weight:600;font-size:13px;}
.vocab-def-preview{color:#8a8576;font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.vocab-tag-pill{display:inline-block;font-size:9.5px;color:#666;border:1px solid #2e2e2a;padding:1px 5px;border-radius:8px;margin-right:3px;margin-top:3px;}
.vocab-tag-pill.routing{color:#c87a7a;border-color:#5a3a3a;}
.vocab-count-bar{font-size:11px;color:#555;margin-bottom:8px;}
.preview-panel{grid-row:2;background:#0f0f0d;border-left:1px solid #2a2a27;overflow-y:auto;padding:18px 16px;}
.pv-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #222;}
.pv-header h3{font-size:11px;color:#666;letter-spacing:.1em;text-transform:uppercase;}
.pv-box{background:#161614;border:1px solid #252522;padding:14px;font-size:13px;line-height:1.8;color:#b8a880;font-style:italic;min-height:60px;margin-bottom:10px;}
.pv-box .byline{font-style:normal;color:#555;font-size:11px;margin-top:10px;}
.pv-box .preamble{font-style:normal;color:#777;font-size:11px;margin-bottom:10px;line-height:1.5;}
.pv-box .closing{font-style:normal;color:#666;font-size:11px;margin-top:10px;padding-top:8px;border-top:1px solid #1e1e1c;line-height:1.5;}
.pline{margin:5px 0;padding-left:8px;border-left:2px solid #333;}
.pline.green{color:#7ab87a;border-left-color:#4a7a4a;}
.pline.red{color:#c87a5a;border-left-color:#7a4a3a;}
.tone-pill{display:inline-block;padding:1px 6px;font-size:10px;border:1px solid #2a2a2a;color:#555;margin:2px 1px;font-style:normal;}
.tone-doom{border-color:#5a3030;color:#a06060;}
.tone-hope{border-color:#305a3a;color:#608060;}
.stat-row{display:flex;justify-content:space-between;font-size:11px;color:#444;padding:3px 0;}
.stat-row span:last-child{color:#777;}
.export-area{background:#0a0a09;border:1px solid #222;padding:10px;font-size:11px;font-family:'Courier New',monospace;color:#6a8a6a;line-height:1.6;max-height:180px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;display:none;margin-top:6px;}
.export-area.open{display:block;}
.section-stats{margin:10px 0;padding-top:10px;border-top:1px solid #1e1e1c;}
.flavour-sel{margin-bottom:10px;}
.flavour-sel select{font-size:12px;padding:4px 8px;}
.notif{position:fixed;bottom:20px;right:20px;background:#2a2518;border:1px solid #8a7a5a;color:#c8b97a;padding:8px 16px;font-size:12px;opacity:0;transition:opacity .3s;pointer-events:none;}
.notif.show{opacity:1;}
</style>
</head>
<body>
<div class="app">
<div class="topbar">
  <span class="brand">ViceChair — Prose Editor</span>
  <span class="save-badge" id="save-badge">unsaved</span>
  <button class="btn btn-gold" onclick="saveAll()">Save</button>
  <button class="btn" onclick="loadFromFile()">Import JSON</button>
  <button class="btn" onclick="exportJSON()">Export JSON</button>
  <button class="btn" onclick="resetToDefaults()">Reset defaults</button>
</div>
<div class="sidebar" id="sidebar"></div>
<div class="editor" id="editor"></div>
<div class="preview-panel" id="preview"></div>
</div>
<div class="tab-bar" id="tab-bar">
  <button class="tab-btn active" id="tab-browse" onclick="showTab('browse')">
    <span class="tab-icon">☰</span>Browse
  </button>
  <button class="tab-btn" id="tab-edit" onclick="showTab('edit')">
    <span class="tab-icon">✎</span>Edit
  </button>
  <button class="tab-btn" id="tab-preview" onclick="showTab('preview')">
    <span class="tab-icon">◉</span>Preview
  </button>
</div>
<div class="notif" id="notif"></div>
<input type="file" id="file-input" accept=".json" style="display:none" onchange="handleFileImport(event)">

<script>
const CONDITIONS=[
  "religion_extinction","religion_spread","polity_collapse","war_cascade",
  "land_exhaustion","schism_cascade","no_wars","faith_unity",
  "ecological_recovery","dominant_in_polities","mass_exodus",
  "demographic_collapse","allied_at_war","acts_of_god_fired",
  "pressure_critical","nrm_emerged","trade_collapsed"
];
const TONE_TAGS=[
  "doom_religious","doom_martial","doom_political","doom_ecological",
  "doom_demographic","doom_economic","doom_acts_of_god",
  "hope_religious","hope_martial","hope_ecological"
];
const CLUSTERS=["water","fire","body","sky","architecture","agricultural","journey","astronomical"];
const NARRATOR_TYPES=["village_elder","pilgrim","merchant","monk","soldier","forester","innkeeper","scholar","refugee"];
const OCCUPATIONS={
  village_elder:["hearth-elder","council-speaker","memory-keeper","village reeve","hall witness"],
  pilgrim:["road pilgrim","wayfarer","votary","keeper of vows","pilgrim of the Third Road"],
  merchant:["salt-factor","river trader","chapman","caravan drover","tally-keeper","relic broker"],
  monk:["shrine-keeper","scriptor","anchorite","copyist","keeper of relics","itinerant copyist"],
  soldier:["march warden","garrison hand","spear-bearer","border rider","shield-retainer","toll-reeve"],
  forester:["woodward","moss gatherer","charcoal burner","trapper","forest witness","bog-herdsman"],
  innkeeper:["hosteler","ale-wife","roadside keeper","keeper of the common room","ferryman"],
  scholar:["annotator","lector","genealogist","calendar-keeper","student of omens","hedge-astrologer","bone-reader"],
  refugee:["displaced soul","wanderer","uprooted one","exile","road-bound survivor"]
};
const TERRAINS=["Forest","Hills","Mountain","Tilled","Pasture","Coast"];
const TERRAIN_PLACES={
  Forest:["the deep wood","the forest margin","the tree-dark country"],
  Hills:["the hill country","the uplands","the high ground"],
  Mountain:["the mountain passes","the high stone country","the peaks"],
  Tilled:["the cultivated lands","the grain country","the ploughland"],
  Pasture:["the open grazing","the common ground","the downs"],
  Coast:["the tideland","the shore country","the littoral"]
};
const SEASONAL_OPENINGS=[
  "The season has shed another skin.",
  "The heavens complete another circuit.",
  "The reckoning sticks advance once more.",
  "Another quarter of the year is consumed.",
  "The sun returns by its appointed road.",
  "The old season has entered memory.",
  "The wheel groans onward.",
  "The stars have resumed their ancient argument.",
  "Another measure of time is spent.",
  "The seasons do not pause for deliberation."
];
const NAR_CLOSINGS=[
  "Such is the condition of things.",
  "The season will judge us soon enough.",
  "I have written what I have seen.",
  "The rest belongs to Providence.",
  "May wiser heads interpret these signs.",
  "The heavens have not yet clarified the matter.",
  "Whether this is omen or coincidence remains disputed.",
  "The road will provide its own answer.",
  "Such talk occupies the long evenings.",
  "I leave the conclusion to those better educated.",
  "So it has been set down.",
  "This is what I have seen with my own eyes.",
  "The future remains, as always, uncooperative.",

const RUMOUR_OPENERS=[
  "A drover from the south reports that ",
  "The ferryfolk insist that ",
  "Those who crossed the river speak of ",
  "A matter much discussed in the alehouses concerns ",
  "Merchants arriving under uncertain skies claim ",

  "Those who passed through lately spoke of ",
  "The pilgrims who stopped here told of ",

  "Word comes from those who travel the eastern road that ",
  "A scholar passing through noted in his account that ",
  "The itinerant preacher who addressed the market square claimed that ",
  "Those who work the river report that ",
  "Among the road people there is talk of ",
  "A merchant of some standing who stopped at the inn maintained that "
];
const P_PREAMBLES_DOOM=[
  "Set down by {occ}, whose hand trembled in the writing:",
  "From the account of {occ}, who serves {rel} and who saw what follows in a vision:",
  "Attributed to {occ}, whose authority in matters of {rel} is not disputed:",
  "The {occ} who transcribed this asked that it be noted she did not wish to transcribe it:",
  "Copied from the margin of the {rel} commentary, in a hand identified as that of {occ}:",
  "Delivered by {occ} to the assembled faithful of {rel}, in these words:",

];
const P_PREAMBLES_HOPE=[
  "Set down by {occ}, who believed what was shown and recorded it faithfully:",
  "From the account of {occ}, who serves {rel} and who was shown what follows:",
  "Attributed to {occ}, in whose hearing the following was made plain:",

  "Delivered by {occ} to the faithful of {rel} as a matter of hope rather than certainty:",

const P_CLOSINGS_DOOM=[
  "This is what is written. What is written is not always what occurs.",

  "This vision was not sought. It arrived uninvited, clear, and unwelcome.",
  "The bone-reader set this down and then sat for a long time without speaking. Eventually she said: it is not certain. But it is likely.",

];
const P_CLOSINGS_HOPE=[
  "This is the promise that has been seen in the pattern. Promises require fulfilment.",
  "The possibility has been recorded. Possibility and certainty are not the same.",
  "What might be has been set down alongside what is. The distance between them is the work.",
  "The record shows a way. Ways require walking.",
  "The pattern admits this outcome. Admitting an outcome is not the same as guaranteeing it.",
  "This is what the stars show as possible. The stars are not always read correctly. But they are not always misread either.",
  "The promise that was seen is set down here. Promises are made to be kept or broken. The keeping is the faithful work.",
  "It was shown that this was possible. The showing is not the achieving."
];

const MISSIVE_TYPES=["pressure_plea","land_plea","schism_warning","military_threat","refugee_plea","conversion_report"];
const LOG_EVENT_TYPES=["uprising","war_declared","war_victory","war_stalemate","schism","nrm_emerged","religion_drift","land_stressed","land_depleted","land_exhausted","land_recovery","border_tension","acts_of_god"];
const CREED_THEOLOGIES=["Communal","Hierarchical","Quietist","Militant","Evangelical","Restorative","Apocalyptic","Syncretic","Traditionalist","Reformist"];

const DEFAULT_DATA={
  prophecy_utterances:[
    {id:"W-01",cluster:"water",base:"The old water shall remember its source, or forget it entirely.",conditions:["religion_spread","religion_extinction"],tone:["doom_religious","hope_religious"],reskins:{Martial:"The river of the faithful shall carve new channels, or run to nothing in the sand.",Restorative:"The sacred flow shall return to the living earth, or be swallowed by dry ground.",Monastic:"The well of doctrine shall be replenished from its source, or the vessel shall stand empty.",Evangelical:"The word travels as water travels — it finds every crack, or it does not flow at all."}},
    {id:"W-02",cluster:"water",base:"What the tide brings in, the tide shall also carry away.",conditions:["mass_exodus","trade_collapsed"],tone:["doom_demographic","doom_economic"],reskins:{Martial:"What the army gathers, the army shall also scatter.",Restorative:"What the earth yields, the earth shall also reclaim.",Monastic:"What the order preserves, neglect shall also consume.",Evangelical:"What the mission planted, the season shall also uproot."}},
    {id:"W-03",cluster:"water",base:"The river mourns nothing. This is its power and its indifference.",conditions:["demographic_collapse","allied_at_war"],tone:["doom_demographic","doom_martial"],reskins:{Martial:"The army mourns nothing. Its indifference is the source of its strength and its disgrace.",Restorative:"The forest mourns nothing it releases. What falls becomes what grows.",Monastic:"The order mourns no doctrine it sets aside. This is wisdom and it is also loss.",Evangelical:"The road mourns no traveller who turns back. The road does not know the difference."}},
    {id:"F-01",cluster:"fire",base:"The hearth that goes cold is harder to relight than one that was never lit.",conditions:["religion_extinction","polity_collapse"],tone:["doom_religious","doom_political"],reskins:{Martial:"The army that disbands is harder to raise than one that never formed.",Restorative:"The grove that is cleared is harder to regrow than one never touched.",Monastic:"The practice that lapses is harder to resume than one never begun.",Evangelical:"The congregation that disperses is harder to call than one never gathered."}},
    {id:"F-02",cluster:"fire",base:"Smoke rises from what the fire has finished with.",conditions:["polity_collapse","mass_exodus"],tone:["doom_political","doom_demographic"],reskins:{Martial:"Smoke rises from what the army has finished with.",Restorative:"New growth rises from what the fire has finished with. Not from what stands.",Monastic:"Wisdom rises from what the examination has finished with.",Evangelical:"The word travels furthest from what it has finished converting."}},
    {id:"B-01",cluster:"body",base:"The body that does not feel its fever is the most dangerous patient.",conditions:["pressure_critical","acts_of_god_fired"],tone:["doom_political","doom_acts_of_god"],reskins:{Martial:"The army that does not know it is broken is the most dangerous to command.",Restorative:"The land that does not show its exhaustion is the closest to collapse.",Monastic:"The doctrine that does not know it is corrupt is the hardest to reform.",Evangelical:"The congregation that does not know it is drifting is the furthest from the road."}},
    {id:"B-04",cluster:"body",base:"Old bone does not forget the breaking.",conditions:["polity_collapse","religion_extinction"],tone:["doom_political","doom_religious"],reskins:{Martial:"Old soldiers do not forget the field where they broke.",Restorative:"Old growth does not forget the fire that took it.",Monastic:"Old doctrine does not forget the council that revised it.",Evangelical:"Old roads do not forget the feet that abandoned them."}},
    {id:"S-01",cluster:"sky",base:"The stars do not hurry, but they arrive.",conditions:["acts_of_god_fired","war_cascade"],tone:["doom_acts_of_god"],reskins:{Martial:"The army does not hurry, but it arrives.",Restorative:"The season does not hurry, but it turns.",Monastic:"The reckoning does not hurry, but it is written.",Evangelical:"The word does not hurry, but it is heard."}},
    {id:"S-07",cluster:"sky",base:"The sky records. It does not interpret. That work is left to others.",conditions:["polity_collapse","mass_exodus"],tone:["doom_political","doom_demographic"],reskins:{Martial:"The chronicle records. It does not judge. That work is left to those who come after.",Restorative:"The earth absorbs. It does not interpret. That is the work of those who cultivate it.",Monastic:"The archive preserves. It does not adjudicate. The adjudication is the reader's burden.",Evangelical:"The road continues. It does not evaluate the traveller. That is someone else's commission."}},
    {id:"AG-01",cluster:"agricultural",base:"The field that is never left fallow shall eventually refuse the seed.",conditions:["land_exhaustion","ecological_recovery"],tone:["doom_ecological"],reskins:{Martial:"The soldier that is never rested shall eventually refuse the order.",Restorative:"The grove that is never left alone shall eventually refuse the root.",Monastic:"The mind that is never left to rest shall eventually refuse the text.",Evangelical:"The road that is never left quiet shall eventually refuse the traveller."}},

  // Vocabulary pool — browsable word banks with definitions, organised by part of speech
  {key:'vocab_noun',label:'Nouns',group:'Vocabulary Pool',type:'vocab',pos:'noun'},
  {key:'vocab_adjective',label:'Adjectives',group:'Vocabulary Pool',type:'vocab',pos:'adjective'},
  {key:'vocab_verb',label:'Verbs',group:'Vocabulary Pool',type:'vocab',pos:'verb'},
  {key:'vocab_phrase',label:'Phrases & epithets',group:'Vocabulary Pool',type:'vocab',pos:'phrase'}

];

// ─────────────────────────────────────────────
// VARIABLE / PLACEHOLDER SUPPORT
//
// Each section that the game substitutes at runtime gets a fixed list of
// {token} variables, matching exactly what the consuming GDScript function
// replaces. These are NOT arbitrary — they mirror real .replace() calls in
// main_fixed.gd / narrative_generator.gd. Sections with no entry here (or
// an empty array) are used verbatim with no substitution, so no chips show.
//
// log_uprising, log_schism, and log_land_stressed are wired with placeholder
// sets matching their target functions (prose_uprising, prose_schism,
// prose_land_stress) but are NOT YET connected on the Godot side.
// log_acts_of_god has no placeholders here on purpose: that event has four
// separate sub-pools in-game (plague/famine/flood/upheaval), so a single
// flat list can't represent it correctly.
// ─────────────────────────────────────────────
const PLACEHOLDERS = {
  missives_pressure_plea:    ['gov_name','rel_name','terrain','adj','people'],
  missives_land_plea:        ['gov_name','rel_name','terrain','adj','people'],
  missives_schism_warning:   ['gov_name','rel_name','terrain','adj','people'],
  missives_military_threat:  ['gov_name','rel_name','terrain','adj','people'],
  missives_refugee_plea:     ['gov_name','rel_name','terrain','adj','people'],
  missives_conversion_report:['gov_name','rel_name','terrain','adj','people'],
  log_war_declared:  ['hedge','aggressor','defender','verb','place','adj','connective'],
  log_war_victory:   ['hedge','winner','loser','seasons','place','connective','verb'],
  log_nrm_emerged:   ['hedge','new_faith','parent_a','parent_b','place','connective'],
  log_uprising:      ['hedge','people','place','gov_name','authority','connective','adj'],
  log_schism:        ['hedge','clergy','gov_name','verb','old_faith','new_faith','connective','adj'],
  log_land_stressed: ['hedge','place','gov_name','verb','severity','connective']
};

const SAMPLE_VALUES = {
  gov_name:'the Marrowfen Commonwealth', rel_name:'the Reconciled Brotherhood',
  terrain:'pasture', adj:'troubled', people:'the common faithful',
  hedge:'It is said that', connective:'And so',
  aggressor:'the Verlanth Dominion', defender:'the Aubrey Compact',
  winner:'the Verlanth Dominion', loser:'the Aubrey Compact',
  seasons:'7', verb:'laid waste to', place:'the forest margin',
  new_faith:'the Lantern Creed', parent_a:'the Reconciled Brotherhood',
  parent_b:'the Quiet Order', authority:'the ruling council',
  old_faith:'the Old Rite', clergy:'the ordained', severity:'depleted'
};

function substituteSample(text, tokens) {
  let out = text || '';
  tokens.forEach(t => { out = out.split('{'+t+'}').join(SAMPLE_VALUES[t] || ('{'+t+'}')); });
  return out;
}
function insertPlaceholder(i, token) {
  const ta = document.getElementById('simple-ta-'+i);
  if (!ta) return;
  const start = ta.selectionStart, end = ta.selectionEnd;
  const ins = '{'+token+'}';
  ta.value = ta.value.slice(0,start) + ins + ta.value.slice(end);
  ta.selectionStart = ta.selectionEnd = start + ins.length;
  ta.focus();
  setSimple(i, ta.value);
  refreshSamplePreview(i);
}
function refreshSamplePreview(i) {
  const el = document.getElementById('sample-preview-'+i);
  const ta = document.getElementById('simple-ta-'+i);
  if (!el || !ta) return;
  const tokens = PLACEHOLDERS[currentSection] || [];
  el.textContent = substituteSample(ta.value, tokens);
}

function getItems(key) {
  const sec = SECTIONS.find(s=>s.key===key);
  if (!sec) return [];
  if (sec.type==='prophecy') return data.prophecy_utterances;
  if (sec.type==='simple') return data[key]||[];
  if (sec.type==='missive_sub') return (data.missives||{})[sec.sub]||[];
  if (sec.type==='log_sub') return (data.log_events||{})[sec.sub]||[];
  if (sec.type==='creed_sub') return (data.creed_articles||{})[sec.sub]||[];
  if (sec.type==='race_sub') {
    if (!data.race_vocab) data.race_vocab = JSON.parse(JSON.stringify(RACE_VOCAB_DEFAULT));
    return ((data.race_vocab||{})[sec.race]||{})[sec.sub]||[];
  }
  if (sec.type==='terrain_sub') {
    if (!data.terrain_resources) data.terrain_resources = JSON.parse(JSON.stringify(TERRAIN_RESOURCES_DEFAULT));
    return ((data.terrain_resources||{})[sec.terrain]||{})[sec.sub]||[];
  }
  if (sec.type==='vocab') {
    if (!data.vocab_pool) data.vocab_pool = JSON.parse(JSON.stringify(VOCAB_POOL_DEFAULT));
    return (data.vocab_pool||{})[sec.pos]||[];
  }
  return [];
}
function setItems(key, arr) {
  const sec = SECTIONS.find(s=>s.key===key);
  if (!sec) return;
  if (sec.type==='simple') { data[key]=arr; return; }
  if (sec.type==='missive_sub') { data.missives[sec.sub]=arr; return; }
  if (sec.type==='log_sub') { data.log_events[sec.sub]=arr; return; }
  if (sec.type==='creed_sub') { data.creed_articles[sec.sub]=arr; return; }
  if (sec.type==='race_sub') {
    if (!data.race_vocab) data.race_vocab = JSON.parse(JSON.stringify(RACE_VOCAB_DEFAULT));
    if (!data.race_vocab[sec.race]) data.race_vocab[sec.race]={};
    data.race_vocab[sec.race][sec.sub]=arr; return;
  }
  if (sec.type==='terrain_sub') {
    if (!data.terrain_resources) data.terrain_resources = JSON.parse(JSON.stringify(TERRAIN_RESOURCES_DEFAULT));
    if (!data.terrain_resources[sec.terrain]) data.terrain_resources[sec.terrain]={};
    data.terrain_resources[sec.terrain][sec.sub]=arr; return;
  }
  if (sec.type==='vocab') {
    if (!data.vocab_pool) data.vocab_pool = JSON.parse(JSON.stringify(VOCAB_POOL_DEFAULT));
    data.vocab_pool[sec.pos]=arr; return;
  }
}
function currentType() {
  const sec = SECTIONS.find(s=>s.key===currentSection);
  if (!sec) return 'simple';
  if (sec.type==='race_sub' || sec.type==='terrain_sub') return 'simple';
  return sec.type||'simple';
}

function pick(arr) { if(!arr||!arr.length) return ''; return arr[Math.floor(Math.random()*arr.length)]; }
function markDirty() { isDirty=true; document.getElementById('save-badge').textContent='unsaved'; document.getElementById('save-badge').className='save-badge'; }
function markSaved() { isDirty=false; document.getElementById('save-badge').textContent='saved'; document.getElementById('save-badge').className='save-badge saved'; }

function notify(msg) {
  const n=document.getElementById('notif');
  n.textContent=msg; n.className='notif show';
  setTimeout(()=>n.className='notif',2000);
}

function saveAll() {
  try {
    localStorage.setItem('vicechair_prose_v2', JSON.stringify(data));
    markSaved();
    notify('Saved to browser storage');
  } catch(e) { notify('Save failed: '+e.message); }
}

function loadSaved() {
  try {
    const raw = localStorage.getItem('vicechair_prose_v2');
    if (raw) { data = JSON.parse(raw); markSaved(); return true; }
  } catch(e) {}

function resetToDefaults() {

function exportJSON() {
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'vicechair_prose.json';
  a.click();
  notify('JSON exported');
}

function loadFromFile() { document.getElementById('file-input').click(); }
function handleFileImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      data = JSON.parse(ev.target.result);
      markDirty(); renderAll(); notify('Imported: '+file.name);
    } catch(err) { notify('Import failed: '+err.message); }
  };
  reader.readAsText(file);
  e.target.value='';
}



function renderAll() { renderSidebar(); renderEditor(); refreshPreview(); }

let collapsedGroups = {};

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  let groups = {};
  SECTIONS.forEach(s => {
    if (!groups[s.group]) groups[s.group]=[];
    groups[s.group].push(s);
  });
  let html='';
  for (const [g,items] of Object.entries(groups)) {
    // Default Race/Terrain groups to collapsed the first time they're seen —
    // there are dozens of these and they'd otherwise dominate the sidebar.
    if (!(g in collapsedGroups)) {
      collapsedGroups[g] = g.startsWith('Race —') || g.startsWith('Terrain —');
    }
    const isCollapsed = collapsedGroups[g];
    const gid = 'grp-'+g.replace(/[^a-zA-Z0-9]/g,'_');
    html+=`<div class="nav-group ${isCollapsed?'collapsed':''}" onclick="toggleGroup('${g.replace(/'/g,"\\'")}')">
      <span>${g}</span><span class="nav-caret">▾</span>
    </div>`;
    html+=`<div class="nav-group-body ${isCollapsed?'collapsed':''}" id="${gid}">`;
    items.forEach(s=>{
      const arr=getItems(s.key);
      const count=Array.isArray(arr)?arr.length:0;
      html+=`<div class="nav-item ${currentSection===s.key?'active':''}" onclick="switchSection('${s.key}')">
        <span>${s.label}</span><span class="nav-count">${count}</span>
      </div>`;
    });
    html+=`</div>`;
  }
  sb.innerHTML=html;
}
function toggleGroup(g) {
  collapsedGroups[g] = !collapsedGroups[g];
  renderSidebar();
}

function switchSection(key) {
  currentSection=key; editingId=null; showExport=false; vocabSearchQuery='';
  const sec = SECTIONS.find(s=>s.key===key);
  if (sec) collapsedGroups[sec.group] = false;
  renderSidebar(); renderEditor(); refreshPreview();
}

function renderEditor() {
  const ed=document.getElementById('editor');
  const sec=SECTIONS.find(s=>s.key===currentSection);
  const items=getItems(currentSection);
  const type=currentType();

  let html=`<div class="ed-header"><h2>${sec.label}</h2><p>${items.length} entries · click any entry to edit</p></div>`;

  if (type==='prophecy') {
    items.forEach(item=>{
      const isOpen=editingId===item.id;
      html+=`<div class="entry-card ${isOpen?'open':''}" id="card-${item.id}">
        <div class="entry-row" onclick="toggleEdit('${item.id}')">
          <span class="entry-idx">${item.id}</span>
          <span class="entry-txt">${item.base||'<empty>'}</span>
          <button class="del-btn" onclick="deleteProphecy(event,'${item.id}')">✕</button>
        </div>
        ${isOpen?buildProphecyForm(item):''}
      </div>`;
    });
    html+=`<div class="add-row" onclick="addProphecy()">+ Add utterance</div>`;
  } else if (type==='vocab') {
    const q = vocabSearchQuery;
    const filtered = items.map((it,i)=>({it,i})).filter(({it})=>{
      if (!q) return true;
      const word=(it.word||'').toLowerCase(), def=(it.def||'').toLowerCase();
      const tagsMatch=(it.tags||[]).some(t=>t.toLowerCase().includes(q));
      return word.includes(q) || def.includes(q) || tagsMatch;
    });
    html = `<div class="ed-header"><h2>${sec.label}</h2><p>${items.length} entries · ${filtered.length} shown · click any entry to edit</p></div>`;
    html += `<input class="vocab-search" type="text" placeholder="Search word, definition, or tag…" value="${vocabSearchQuery.replace(/"/g,'&quot;')}" oninput="setVocabSearch(this.value)">`;
    filtered.forEach(({it,i})=>{
      const isOpen=editingId===String(i);
      const tagsHtml=(it.tags||[]).map(t=>`<span class="vocab-tag-pill ${VOCAB_ROUTING_TAGS.includes(t)?'routing':''}">${t}</span>`).join('');
      html+=`<div class="entry-card ${isOpen?'open':''}" id="card-${i}">
        <div class="vocab-row" onclick="toggleEdit('${i}')">
          <span class="vocab-word">${it.word||'<empty>'}</span>
          <span class="vocab-def-preview">${it.def||''}</span>
          <button class="del-btn" onclick="deleteVocab(event,${i})">✕</button>
        </div>
        <div>${tagsHtml}</div>
        ${isOpen?buildVocabForm(it,i):''}
      </div>`;
    });
    html+=`<div class="add-row" onclick="addVocab()">+ Add word</div>`;
  } else {
    items.forEach((text,i)=>{
      const isOpen=editingId===String(i);
      html+=`<div class="entry-card ${isOpen?'open':''}" id="card-${i}">
        <div class="entry-row" onclick="toggleEdit('${i}')">
          <span class="entry-idx">#${i+1}</span>
          <span class="entry-txt ${!text?'empty':''}">${text||'<empty>'}</span>
          <button class="del-btn" onclick="deleteSimple(event,${i})">✕</button>
        </div>
        ${isOpen?buildSimpleForm(text,i):''}
      </div>`;
    });
    html+=`<div class="add-row" onclick="addSimple()">+ Add entry</div>`;
  }
  ed.innerHTML=html;
}

function buildSimpleForm(text,i) {
  const tokens = PLACEHOLDERS[currentSection] || [];
  const chips = tokens.length
    ? `<div class="fl">Insert variable</div>
       <div class="var-hint">Click to insert at cursor. These match what the game actually substitutes — don't invent new ones.</div>
       <div class="tag-row">${tokens.map(t=>`<span class="tag" onclick="insertPlaceholder(${i},'${t}')">{${t}}</span>`).join('')}</div>`
    : '';
  const preview = tokens.length
    ? `<div class="fl">Preview with sample values</div>
       <div class="sample-preview" id="sample-preview-${i}">${substituteSample(text, tokens)}</div>`
    : '';
  return `<div class="edit-body open">
    <div class="fl">Text</div>
    <textarea id="simple-ta-${i}" rows="3" oninput="setSimple(${i},this.value);refreshSamplePreview(${i})">${text}</textarea>
    ${chips}
    ${preview}
    <div class="form-btns">
      <button class="btn btn-gold" onclick="saveAndClose()">Done</button>
      <button class="btn" onclick="closeEdit()">Close</button>

}

const VOCAB_TAG_OPTIONS = ['archaic','formal','technical','religious','military','nautical',

  'courtly','art','medical','heraldic','epithet','moral',

function prophecyPreview() {
  const items=data.prophecy_utterances;
  if(items.length<4) return `<div class="pv-box" style="color:#333;">Need 4+ utterances.</div>`;
  const flavs=['base','Martial','Restorative','Monastic','Evangelical'];
  const flav=pick(flavs);
  const isDoom=Math.random()>0.4;
  const rel=pick(['Order of the Turning','Compact of the Remnant','College of the Hidden Fire','Fellowship of the Balance']);
  const occ=pick(['bone-reader','hedge-astrologer','shrine-keeper','anchorite','student of omens','march warden','river witness','memory-keeper']);
  const preamble=pick(isDoom?P_PREAMBLES_DOOM:P_PREAMBLES_HOPE).replace(/{occ}/g,occ).replace(/{rel}/g,rel);
  const closing=pick(isDoom?P_CLOSINGS_DOOM:P_CLOSINGS_HOPE);
  const shuffled=[...items].sort(()=>Math.random()-.5);
  const sel=[];const usedClusters=[];
  for(const item of shuffled){
    if(sel.length>=4)break;
    if(!usedClusters.includes(item.cluster)||sel.length>=3){sel.push(item);if(!usedClusters.includes(item.cluster))usedClusters.push(item.cluster);}
  }
  while(sel.length<4&&shuffled.length>=4){const e=shuffled.find(i=>!sel.includes(i));if(e)sel.push(e);else break;}
  const linesHtml=sel.map(item=>{
    const txt=(flav!=='base'&&item.reskins[flav])?item.reskins[flav]:item.base;
    const green=Math.random()>.55;
    const tones=item.tone.map(t=>`<span class="tone-pill ${t.startsWith('doom')?'tone-doom':'tone-hope'}">${t.replace(/_/g,' ')}</span>`).join('');
    return `<div class="pline ${green?'green':'red'}">${txt}<div style="margin-top:2px;">${tones}</div></div>`;
  }).join('');
  return `<div style="margin-bottom:6px;font-size:11px;color:#555;">
    Flavour: <strong style="color:#c8b97a;">${flav}</strong> · ${isDoom?'<span style="color:#c87a5a;">Doom</span>':'<span style="color:#7ab87a;">Promise</span>'} · ${rel}
  </div>
  <div class="pv-box">
    <div class="preamble">${preamble}</div>
    ${linesHtml}
    <div class="closing">${closing}</div>
  </div>
  <p style="font-size:11px;color:#444;margin-bottom:10px;">Colours are randomised for preview.</p>`;
}

function observationPreview() {
  const sec = SECTIONS.find(s=>s.key===currentSection);
  const type = sec ? sec.type : 'simple';
  const items=getItems(currentSection);
  if(!items.length) return `<div class="pv-box" style="color:#333;">No entries yet.</div>`;

  if(type==='vocab') {
    const w1=pick(items), w2=items.length>1?pick(items.filter(i=>i!==w1)):null;
    const card=(w)=>`<div style="margin-bottom:8px;"><span style="color:#c8b97a;font-weight:600;">${w.word||'<empty>'}</span>
      <div style="color:#8a8576;margin-top:2px;">${w.def||''}</div>
      <div style="margin-top:3px;">${(w.tags||[]).map(t=>`<span class="vocab-tag-pill ${VOCAB_ROUTING_TAGS.includes(t)?'routing':''}">${t}</span>`).join('')}</div></div>`;
    return `<div class="pv-box">${card(w1)}${w2?card(w2):''}</div>
      <p style="font-size:11px;color:#444;margin-bottom:10px;">A vocabulary pool — not used directly by the game. Pull words from here while writing other sections.</p>`;
  }

  if(type==='race_sub') {
    const s1=pick(items);
    const s2=items.length>1?pick(items.filter(i=>i!==s1)):null;
    return `<div class="pv-box">
      <div style="font-size:10px;color:#666;margin-bottom:8px;font-style:normal;letter-spacing:.08em;">${sec.race.toUpperCase()} — ${sec.sub.replace(/_/g,' ')}</div>
      <div style="margin-bottom:8px;">${s1}</div>
      ${s2?`<div style="color:#888;">${s2}</div>`:''}
    </div><p style="font-size:11px;color:#444;margin-bottom:10px;">Feeds into race-specific narrator passages and missive voices.</p>`;
  }

  if(type==='terrain_sub') {
    const s1=pick(items);
    const s2=items.length>1?pick(items.filter(i=>i!==s1)):null;
    return `<div class="pv-box">
      <div style="font-size:10px;color:#666;margin-bottom:8px;font-style:normal;letter-spacing:.08em;">${sec.terrain.toUpperCase()} — ${sec.sub.replace(/_/g,' ')}</div>
      <div style="margin-bottom:8px;">${s1}</div>
      ${s2?`<div style="color:#888;">${s2}</div>`:''}
    </div><p style="font-size:11px;color:#444;margin-bottom:10px;">Feeds into trade missives, caravan events, and economic observations.</p>`;
  }

  if(type==='missive_sub') {
    const text=pick(items);
    const names=['Corvane of the eastern hills','the keeper at Thornwald','a shrine-sister of the southern route','the hall witness at Redmere','a factor of long acquaintance'];
    const sender=pick(names);
    const subs=['A matter requiring your attention','I write on behalf of those here','Concerning the present situation','For your consideration','I would not write if it were not necessary'];
    return `<div class="pv-box">
      <div style="font-size:11px;color:#555;margin-bottom:8px;font-style:normal;">From: ${sender}</div>
      <div style="font-size:11px;color:#666;margin-bottom:10px;font-style:normal;">${pick(subs)}</div>
      ${text}
    </div>`;
  }
  if(type==='log_sub') {
    let text=pick(items);
    text=text.replace(/{aggressor}/g,'the realm of Corvane').replace(/{defender}/g,'the Thornwald commonwealth').replace(/{winner}/g,'the realm of Corvane').replace(/{loser}/g,'the Thornwald commonwealth').replace(/{seasons}/g,'10').replace(/{nrm_name}/g,'Sovo Ge').replace(/{parent_a}/g,'Order of the Turning').replace(/{parent_b}/g,'Compact of the Remnant').replace(/{terrain}/g,'Forest');
    return `<div class="pv-box" style="font-style:normal;font-size:13px;color:#b0a880;">
      <div style="font-size:10px;color:#555;margin-bottom:8px;letter-spacing:.08em;">SEASON ${Math.floor(Math.random()*150)+20} — ${SECTIONS.find(s=>s.key===currentSection)?.label?.toUpperCase()}</div>
      ${text}
    </div>`;
  }
  if(type==='creed_sub') {
    const text=pick(items);
    const sub=SECTIONS.find(s=>s.key===currentSection)?.sub||'';
    return `<div class="pv-box">
      <div style="font-size:10px;color:#777;margin-bottom:8px;font-style:normal;letter-spacing:.06em;">${sub.toUpperCase()} · ARTICLE ${Math.floor(Math.random()*4)+1}</div>
      ${text}
    </div>`;
  }
  const narratorType=pick(NARRATOR_TYPES);
  const occ=pick(OCCUPATIONS[narratorType]);
  const terrain=pick(TERRAINS);
  const place=pick(TERRAIN_PLACES[terrain]);
  const opening=pick(SEASONAL_OPENINGS);
  const obs1=pick(items);
  const rest=items.filter(i=>i!==obs1);
  const obs2=rest.length?pick(rest):null;
  const rest2=(rest.filter(i=>i!==obs2));
  const obs3=rest2.length?pick(rest2):null;
  const rumour=pick(RUMOUR_OPENERS);
  const closing=pick(NAR_CLOSINGS);
  const lc=s=>s?s.charAt(0).toLowerCase()+s.slice(1):s;
  let passage=`${opening} The talk of ${place} runs to ${lc(obs1)}`;
  if(!passage.endsWith('.'))passage+='.';
  if(obs2){passage+=` ${obs2}`;if(!passage.endsWith('.'))passage+='.';}
  if(obs3){passage+=` ${rumour}${lc(obs3)}`;if(!passage.endsWith('.'))passage+='.';}
  passage+=` ${closing}`;
  return `<div class="pv-box">${passage}<div class="byline">— ${occ}, ${place}</div></div>`;
}

function statsBlock() {
  const items=getItems(currentSection);
  const count=Array.isArray(items)?items.length:0;
  let html=`<div class="section-stats"><div class="stat-row"><span>Entries</span><span>${count}</span></div>`;
  if(currentType()==='prophecy'){
    const clusters={};
    items.forEach(i=>{clusters[i.cluster]=(clusters[i.cluster]||0)+1;});
    Object.entries(clusters).forEach(([c,n])=>{
      html+=`<div class="stat-row"><span>${c}</span><span>${n}</span></div>`;
    });
  }
  html+=`</div>`;
  return html;
}

function exportBlock() {
  return `<div>
    <button class="btn btn-gold" style="width:100%;margin-bottom:6px;" onclick="toggleExport()">
      ${showExport?'Hide':'Show'} GDScript export
    </button>
    <div class="export-area ${showExport?'open':''}" id="export-area">${showExport?generateExport():''}</div>
    ${showExport?`<button class="btn" style="width:100%;margin-top:4px;" onclick="copyExport()">Copy to clipboard</button>`:''}
  </div>`;
}

function toggleExport() { showExport=!showExport; refreshPreview(); }

function generateExport() {
  const sec = SECTIONS.find(s=>s.key===currentSection);
  if (!sec) return '';
  const type = sec.type;

  if (type==='prophecy') {
    let out='const PROPHECY_UTTERANCES = {\n';
    data.prophecy_utterances.forEach(item=>{
      const b=(item.base||'').replace(/\\/g,'\\\\').replace(/"/g,'\\"');
      out+=`\t"${item.id}": {\n`;
      out+=`\t\t"base": "${b}",\n`;
      out+=`\t\t"conditions": [${item.conditions.map(c=>`"${c}"`).join(', ')}],\n`;
      out+=`\t\t"tone": [${item.tone.map(t=>`"${t}"`).join(', ')}],\n`;
      out+=`\t\t"cluster": "${item.cluster}",\n`;
      out+=`\t\t"reskins": {\n`;
      ['Martial','Restorative','Monastic','Evangelical'].forEach((f,i,a)=>{
        const v=(item.reskins[f]||'').replace(/\\/g,'\\\\').replace(/"/g,'\\"');
        out+=`\t\t\t"${f}": "${v}"${i<a.length-1?',':''}\n`;
      });
      out+=`\t\t}\n\t},\n`;
    });
    return out+'}';
  }

  const items = getItems(currentSection);
  const esc = s => (s||'').replace(/\\/g,'\\\\').replace(/"/g,'\\"');

  if (type==='race_sub') {
    const name = `RACE_VOCAB_${sec.race.toUpperCase()}_${sec.sub.toUpperCase()}`;
    let out=`# ${sec.race} — ${sec.sub}\nconst ${name} = [\n`;
    items.forEach(i=>{out+=`\t"${esc(i)}",\n`;});
    return out+']';
  }
  if (type==='terrain_sub') {
    const name = `TERRAIN_${sec.terrain.toUpperCase()}_${sec.sub.toUpperCase()}`;
    let out=`# ${sec.terrain} — ${sec.sub}\nconst ${name} = [\n`;
    items.forEach(i=>{out+=`\t"${esc(i)}",\n`;});
    return out+']';
  }
  if (type==='vocab') {
    const name = `VOCAB_${sec.pos.toUpperCase()}`;
    let out=`# Vocabulary pool — ${sec.pos}\nconst ${name} = [\n`;
    items.forEach(it=>{
      const tagsStr=(it.tags||[]).map(t=>`"${esc(t)}"`).join(', ');
      out+=`\t{"word": "${esc(it.word)}", "def": "${esc(it.def)}", "tags": [${tagsStr}]},\n`;
    });
    return out+']';
  }

  const constName = (sec.sub||currentSection).toUpperCase().replace(/[^A-Z0-9]/g,'_');
  let out=`const ${constName} = [\n`;
  items.forEach(i=>{out+=`\t"${esc(i)}",\n`;});
  return out+']';
}

function copyExport() {
  const box=document.getElementById('export-area');
  if(!box)return;
  navigator.clipboard.writeText(box.textContent).then(()=>{
    notify('Copied to clipboard');
  }).catch(()=>{
    const ta=document.createElement('textarea');
    ta.value=box.textContent;
    document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    notify('Copied to clipboard');
  });
}

// ── MOBILE TAB NAVIGATION ────────────────────────────
let currentTab = 'browse';

function isMobile() { return window.innerWidth <= 700; }

function showTab(tab) {
  currentTab = tab;
  if (!isMobile()) return;
  const sidebar = document.getElementById('sidebar');
  const editor = document.getElementById('editor');
  const preview = document.getElementById('preview');
  [sidebar, editor, preview].forEach(el => { if(el) el.classList.remove('mobile-active'); });
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const tabMap = { browse: sidebar, edit: editor, preview: preview };
  const active = tabMap[tab];
  if (active) active.classList.add('mobile-active');
  const btnMap = { browse: 'tab-browse', edit: 'tab-edit', preview: 'tab-preview' };
  const btn = document.getElementById(btnMap[tab]);
  if (btn) btn.classList.add('active');
}

function applyMobileLayout() {
  if (isMobile()) {
    showTab(currentTab);
  } else {
    // On desktop ensure all panels visible
    ['sidebar','editor','preview'].forEach(id => {
      const el = document.getElementById(id);
      if (el) { el.classList.remove('mobile-active'); }
    });
  }
}

// Auto-switch to edit panel when user selects a category on mobile
const _origSwitchSection = switchSection;
function switchSection(key) {
  _origSwitchSection(key);
  if (isMobile()) showTab('edit');
}

// Auto-switch to preview when rolling
function rollAndShow() {
  refreshPreview();
  if (isMobile()) showTab('preview');
}

window.addEventListener('resize', applyMobileLayout);

loadSaved();
renderAll();
applyMobileLayout();

window.addEventListener('beforeunload', e => {
  if(isDirty){ e.preventDefault(); e.returnValue=''; }
});
